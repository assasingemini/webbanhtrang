<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thêm/Sửa Sản Phẩm</title><link rel="icon" href="../images/logo-small.png"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/styles.css"></head>
<body class="min-h-screen bg-gray-100 pt-16">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center"><a href="products.html" class="font-bold text-xl text-[#A60817]" style="font-family:var(--font-heading)">← Sản phẩm</a><button onclick="logout()" class="text-sm px-3 py-1.5 rounded-md text-white bg-gray-800 hover:bg-gray-700">Đăng xuất</button></div></nav>
  <div class="max-w-3xl mx-auto px-4 py-10">
    <h1 id="page-title" class="text-3xl font-bold text-gray-900 mb-8" style="font-family:var(--font-heading)">Thêm sản phẩm</h1>
    <form id="product-form" class="bg-white rounded-2xl shadow p-8 space-y-6">
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Tên sản phẩm *</label><input name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Mô tả *</label><textarea name="description" rows="3" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none resize-none"></textarea></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Giá (VNĐ) *</label><input name="price" type="number" required min="0" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
        <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Danh mục *</label><input name="category" required placeholder="Bánh Tráng Trộn" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      </div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Slug *</label><input name="slug" required placeholder="banh-trang-tron-dac-biet" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">URL hình ảnh *</label><input name="imageUrl" required placeholder="https://..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div class="flex items-center gap-3"><input type="checkbox" name="isAvailable" id="isAvailable" checked class="w-5 h-5 rounded border-gray-300 text-[#A60817] focus:ring-[#FE5200]"><label for="isAvailable" class="text-sm font-semibold text-gray-700">Còn hàng</label></div>
      <div id="form-error" class="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 hidden"></div>
      <button type="submit" class="w-full py-3.5 text-white rounded-xl font-bold text-lg hover:scale-[1.02] active:scale-[0.98] transition-all" style="background:linear-gradient(135deg,#A60817,#FE5200)">Lưu sản phẩm</button>
    </form>
  </div>
  <script src="../js/config.js"></script><script src="../js/api.js"></script>
  <script>
    lucide.createIcons();
    async function checkAuth(){try{await api.get('/api/auth/check')}catch{window.location.href='login.html'}}
    async function logout(){try{await api.post('/api/auth/logout',{})}finally{window.location.href='login.html'}}
    
    const editId = new URLSearchParams(window.location.search).get('id');
    
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      if (editId) {
        document.getElementById('page-title').textContent = 'Sửa sản phẩm';
        try {
          const products = await api.get('/api/products/all');
          const p = products.find(x => x.id === parseInt(editId));
          if (p) {
            const f = document.getElementById('product-form');
            f.name.value = p.name; f.description.value = p.description;
            f.price.value = p.price; f.category.value = p.category;
            f.slug.value = p.slug; f.imageUrl.value = p.imageUrl;
            f.isAvailable.checked = p.isAvailable;
          }
        } catch(e) { console.error(e); }
      }
    });

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target, errEl = document.getElementById('form-error');
      errEl.classList.add('hidden');
      const data = { name:f.name.value, description:f.description.value, price:f.price.value, category:f.category.value, slug:f.slug.value, imageUrl:f.imageUrl.value, isAvailable:f.isAvailable.checked };
      try {
        if (editId) { await api.put(`/api/products/${editId}`, data); }
        else { await api.post('/api/products', data); }
        window.location.href = 'products.html';
      } catch(err) { errEl.textContent = err.error || 'Lỗi'; errEl.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
