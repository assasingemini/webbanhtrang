<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quản Lý Sản Phẩm</title><link rel="icon" href="../images/logo-small.png"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/styles.css"></head>
<body class="min-h-screen bg-gray-100 pt-16">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center"><a href="index.html" class="font-bold text-xl text-[#A60817]" style="font-family:var(--font-heading)">← Admin</a><button onclick="logout()" class="text-sm px-3 py-1.5 rounded-md text-white bg-gray-800 hover:bg-gray-700">Đăng xuất</button></div></nav>
  <div class="max-w-7xl mx-auto px-4 py-10">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-gray-900" style="font-family:var(--font-heading)">Sản phẩm</h1>
      <a href="product-form.html" class="px-6 py-2.5 rounded-xl text-white font-bold" style="background:#A60817">+ Thêm sản phẩm</a>
    </div>
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Hình</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tên</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Danh mục</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Giá</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Trạng thái</th><th class="px-6 py-3"></th></tr></thead>
      <tbody class="divide-y divide-gray-200" id="products-table"><tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">Đang tải...</td></tr></tbody></table>
    </div>
  </div>
  <script src="../js/config.js"></script><script src="../js/api.js"></script>
  <script>
    lucide.createIcons();
    async function checkAuth(){try{await api.get('/api/auth/check')}catch{window.location.href='login.html'}}
    async function logout(){try{await api.post('/api/auth/logout',{})}finally{window.location.href='login.html'}}
    async function deleteProduct(id){if(!confirm('Xoá sản phẩm này?'))return;try{await api.delete(`/api/products/${id}`);loadProducts();}catch(e){alert(e.error||'Lỗi');}}
    async function loadProducts(){
      const products=await api.get('/api/products/all');
      const el=document.getElementById('products-table');
      if(!products.length){el.innerHTML='<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">Chưa có sản phẩm</td></tr>';return;}
      el.innerHTML=products.map(p=>`<tr><td class="px-6 py-4"><img src="${p.imageUrl}" class="w-16 h-16 rounded-xl object-cover"></td><td class="px-6 py-4 font-medium text-gray-900">${p.name}</td><td class="px-6 py-4 text-gray-500">${p.category}</td><td class="px-6 py-4 font-bold text-[#A60817]">${new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(p.price)}</td><td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-medium ${p.isAvailable?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}">${p.isAvailable?'Còn hàng':'Hết hàng'}</span></td><td class="px-6 py-4 text-right space-x-2"><a href="product-form.html?id=${p.id}" class="text-blue-600 hover:underline text-sm">Sửa</a><button onclick="deleteProduct(${p.id})" class="text-red-600 hover:underline text-sm">Xoá</button></td></tr>`).join('');
    }
    document.addEventListener('DOMContentLoaded',async()=>{await checkAuth();loadProducts();});
  </script>
</body>
</html>
