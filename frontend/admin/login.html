<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập Admin</title>
  <link rel="icon" href="../images/logo-small.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background:linear-gradient(135deg,#A60817,#FE5200)">
  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md mx-4">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background:#FFB200"><i data-lucide="flame" class="w-8 h-8" style="color:#A60817"></i></div>
      <h1 class="text-2xl font-extrabold text-gray-900" style="font-family:var(--font-heading)">Admin Panel</h1>
      <p class="text-gray-500 text-sm mt-1">Bánh Tráng Trộn Ngon Cần Thơ</p>
    </div>
    <form id="login-form" class="space-y-5">
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label><input name="email" type="email" required placeholder="admin@banhtrang.vn" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Mật khẩu</label><input name="password" type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div id="login-error" class="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 font-medium hidden"></div>
      <button type="submit" class="w-full py-3.5 text-white rounded-xl font-bold text-lg hover:scale-[1.02] active:scale-[0.98] transition-all" style="background:linear-gradient(135deg,#A60817,#FE5200)">Đăng nhập</button>
    </form>
    <div class="mt-6 text-center"><a href="../index.html" class="text-sm text-gray-400 hover:text-[#A60817]">← Về trang chủ</a></div>
  </div>
  <script src="../js/config.js"></script><script src="../js/api.js"></script>
  <script>
    lucide.createIcons();
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      try {
        await api.post('/api/auth/login', { email: e.target.email.value, password: e.target.password.value });
        window.location.href = 'index.html';
      } catch(err) { errEl.textContent = err.error || 'Đăng nhập thất bại'; errEl.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
