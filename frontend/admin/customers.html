<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Khách Hàng</title><link rel="icon" href="../images/logo-small.png"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/styles.css"></head>
<body class="min-h-screen bg-gray-100 pt-16">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center"><a href="index.html" class="font-bold text-xl text-[#A60817]" style="font-family:var(--font-heading)">← Admin</a><button onclick="logout()" class="text-sm px-3 py-1.5 rounded-md text-white bg-gray-800 hover:bg-gray-700">Đăng xuất</button></div></nav>
  <div class="max-w-7xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-gray-900 mb-8" style="font-family:var(--font-heading)">Khách hàng</h1>
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tên</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">SĐT</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Địa chỉ</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Số đơn</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tổng chi</th></tr></thead>
      <tbody class="divide-y divide-gray-200" id="customers-table"><tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">Đang tải...</td></tr></tbody></table>
    </div>
  </div>
  <script src="../js/config.js"></script><script src="../js/api.js"></script>
  <script>
    lucide.createIcons();
    async function checkAuth(){try{await api.get('/api/auth/check')}catch{window.location.href='login.html'}}
    async function logout(){try{await api.post('/api/auth/logout',{})}finally{window.location.href='login.html'}}
    document.addEventListener('DOMContentLoaded',async()=>{
      await checkAuth();
      try{
        const customers=await api.get('/api/customers');
        const el=document.getElementById('customers-table');
        if(!customers.length){el.innerHTML='<tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">Chưa có khách hàng</td></tr>';return;}
        const fmt=v=>new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(v);
        el.innerHTML=customers.map(c=>`<tr><td class="px-6 py-4 font-medium text-gray-900">${c.name}</td><td class="px-6 py-4 text-gray-500">${c.phone}</td><td class="px-6 py-4 text-gray-500 text-sm">${c.address||'–'}</td><td class="px-6 py-4 font-bold">${c.orderCount}</td><td class="px-6 py-4 font-bold text-[#A60817]">${fmt(c.totalSpent)}</td></tr>`).join('');
      }catch(e){console.error(e);}
    });
  </script>
</body>
</html>
