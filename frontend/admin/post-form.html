<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thêm/Sửa Bài Viết</title><link rel="icon" href="../images/logo-small.png"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/styles.css">
  <!-- Quill.js thay TipTap -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body class="min-h-screen bg-gray-100 pt-16">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center"><a href="posts.html" class="font-bold text-xl text-[#A60817]" style="font-family:var(--font-heading)">← Bài viết</a><button onclick="logout()" class="text-sm px-3 py-1.5 rounded-md text-white bg-gray-800 hover:bg-gray-700">Đăng xuất</button></div></nav>
  <div class="max-w-3xl mx-auto px-4 py-10">
    <h1 id="page-title" class="text-3xl font-bold text-gray-900 mb-8" style="font-family:var(--font-heading)">Thêm bài viết</h1>
    <form id="post-form" class="bg-white rounded-2xl shadow p-8 space-y-6">
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Tiêu đề *</label><input name="title" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Slug</label><input name="slug" placeholder="tu-dong-tao-tu-tieu-de" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Tóm tắt *</label><textarea name="excerpt" rows="2" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none resize-none"></textarea></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Nội dung *</label><div id="editor" style="min-height:250px"></div></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">URL ảnh bìa *</label><input name="coverImage" required placeholder="https://..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Tags (phân cách bằng dấu phẩy)</label><input name="tags" placeholder="bánh tráng, review, cần thơ" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] outline-none"></div>
      <details class="border rounded-xl p-4"><summary class="font-semibold text-gray-700 cursor-pointer">SEO (tùy chọn)</summary><div class="space-y-4 mt-4">
        <div><label class="block text-sm text-gray-600 mb-1">SEO Title</label><input name="seoTitle" class="w-full px-4 py-2 rounded-lg border outline-none"></div>
        <div><label class="block text-sm text-gray-600 mb-1">SEO Description</label><textarea name="seoDescription" rows="2" class="w-full px-4 py-2 rounded-lg border outline-none resize-none"></textarea></div>
        <div><label class="block text-sm text-gray-600 mb-1">SEO Keywords</label><input name="seoKeyword" class="w-full px-4 py-2 rounded-lg border outline-none"></div>
      </div></details>
      <div id="form-error" class="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 hidden"></div>
      <button type="submit" class="w-full py-3.5 text-white rounded-xl font-bold text-lg hover:scale-[1.02] active:scale-[0.98] transition-all" style="background:linear-gradient(135deg,#A60817,#FE5200)">Lưu bài viết</button>
    </form>
  </div>
  <script src="../js/config.js"></script><script src="../js/api.js"></script>
  <script>
    lucide.createIcons();
    async function checkAuth(){try{await api.get('/api/auth/check')}catch{window.location.href='login.html'}}
    async function logout(){try{await api.post('/api/auth/logout',{})}finally{window.location.href='login.html'}}

    const quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [
      [{ header: [1,2,3,false] }], ['bold','italic','underline','strike'],
      [{ list:'ordered' },{ list:'bullet' }], ['link','image','blockquote','code-block'], ['clean']
    ]}});

    const editId = new URLSearchParams(window.location.search).get('id');

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      if (editId) {
        document.getElementById('page-title').textContent = 'Sửa bài viết';
        try {
          const posts = await api.get('/api/posts');
          const p = posts.find(x => x.id === parseInt(editId));
          if (p) {
            const f = document.getElementById('post-form');
            f.title.value=p.title; f.slug.value=p.slug; f.excerpt.value=p.excerpt;
            f.coverImage.value=p.coverImage; f.tags.value=(p.tags||[]).join(', ');
            f.seoTitle.value=p.seoTitle||''; f.seoDescription.value=p.seoDescription||''; f.seoKeyword.value=p.seoKeyword||'';
            quill.root.innerHTML = p.content;
          }
        } catch(e) { console.error(e); }
      }
    });

    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f=e.target, errEl=document.getElementById('form-error');
      errEl.classList.add('hidden');
      const content = quill.root.innerHTML;
      if (!content || content === '<p><br></p>') { errEl.textContent='Vui lòng nhập nội dung'; errEl.classList.remove('hidden'); return; }
      const data = { title:f.title.value, slug:f.slug.value, excerpt:f.excerpt.value, content, coverImage:f.coverImage.value, tags:f.tags.value, seoTitle:f.seoTitle.value, seoDescription:f.seoDescription.value, seoKeyword:f.seoKeyword.value };
      try {
        if(editId){await api.put(`/api/posts/${editId}`,data);}else{await api.post('/api/posts',data);}
        window.location.href='posts.html';
      } catch(err) { errEl.textContent=err.error||'Lỗi'; errEl.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
