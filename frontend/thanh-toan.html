<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Toán | Bánh Tráng Trộn Ngon Cần Thơ</title>
  <link rel="icon" href="images/logo-small.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="header"></div>
  <main class="min-h-screen bg-gray-50 pt-24 pb-20">
    <div class="max-w-4xl mx-auto px-4 sm:px-6" id="checkout-page"></div>
  </main>
  <div id="footer"></div><div id="floating-contact"></div><div id="cart-drawer"></div>
  <script src="js/config.js"></script><script src="js/api.js"></script><script src="js/cart.js"></script><script src="js/components.js"></script>
  <script>
    function renderCheckout() {
      const items = Cart.getItems();
      const el = document.getElementById('checkout-page');

      if (items.length === 0) {
        el.innerHTML = `<div class="bg-white rounded-3xl shadow-xl p-8 text-center max-w-lg mx-auto"><div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-6 opacity-50"><i data-lucide="shopping-cart" class="w-10 h-10 text-gray-400"></i></div><h1 class="text-2xl font-bold text-gray-900 mb-3" style="font-family:var(--font-heading)">Giỏ hàng trống</h1><p class="text-gray-500 mb-8">Bạn chưa thêm sản phẩm nào.</p><a href="menu.html" class="inline-flex items-center gap-2 py-3 px-6 bg-[#A60817] text-white rounded-2xl font-bold hover:bg-[#8A2F2C]"><i data-lucide="arrow-left" class="w-4 h-4"></i> Xem thực đơn</a></div>`;
        lucide.createIcons(); return;
      }

      el.innerHTML = `
        <div class="mb-8"><a href="menu.html" class="inline-flex items-center gap-2 text-gray-500 hover:text-[#A60817] font-medium mb-4"><i data-lucide="arrow-left" class="w-4 h-4"></i> Quay lại thực đơn</a><h1 class="text-3xl font-extrabold text-gray-900" style="font-family:var(--font-heading)">Thông tin đặt hàng</h1></div>
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
          <div class="lg:col-span-3">
            <form id="order-form" class="bg-white rounded-2xl shadow-lg p-6 sm:p-8">
              <h2 class="text-lg font-bold text-gray-900 mb-6 flex items-center gap-2" style="font-family:var(--font-heading)"><i data-lucide="user" class="w-5 h-5 text-[#FE5200]"></i> Thông tin người nhận</h2>
              <div class="space-y-5">
                <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Tên người nhận <span class="text-red-500">*</span></label><input name="customerName" type="text" required placeholder="Nguyễn Văn A" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] focus:border-transparent outline-none"></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Số điện thoại <span class="text-red-500">*</span></label><input name="customerPhone" type="tel" required placeholder="0912 345 678" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] focus:border-transparent outline-none"></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Địa chỉ nhận hàng <span class="text-red-500">*</span></label><input name="customerAddress" type="text" required placeholder="123 Đường 30/4, Q. Ninh Kiều" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] focus:border-transparent outline-none"></div>
                <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Ghi chú</label><textarea name="note" rows="3" placeholder="Ví dụ: Giao buổi tối..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#FE5200] focus:border-transparent outline-none resize-none"></textarea></div>
              </div>
              <div id="order-error" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 font-medium hidden"></div>
              <button type="submit" class="w-full mt-6 flex items-center justify-center gap-3 py-4 text-white rounded-2xl font-bold text-lg shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all" style="background:linear-gradient(135deg,#A60817,#FE5200)"><i data-lucide="shopping-cart" class="w-5 h-5"></i> Xác nhận đặt hàng</button>
            </form>
          </div>
          <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 sticky top-24">
              <h2 class="text-lg font-bold text-gray-900 mb-6 flex items-center gap-2" style="font-family:var(--font-heading)"><i data-lucide="shopping-cart" class="w-5 h-5 text-[#A60817]"></i> Đơn hàng (${Cart.getTotalItems()} sản phẩm)</h2>
              <div class="space-y-4 max-h-[400px] overflow-y-auto pr-1">${items.map(i => `<div class="flex gap-3"><div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-gray-100"><img src="${i.imageUrl}" alt="${i.name}" class="w-full h-full object-cover"></div><div class="flex-1 min-w-0"><h4 class="font-semibold text-gray-900 text-sm truncate">${i.name}</h4><p class="text-xs text-gray-500">SL: ${i.quantity}</p><p class="text-sm font-bold text-[#A60817]">${Cart.formatPrice(i.price*i.quantity)}</p></div></div>`).join('')}</div>
              <div class="border-t mt-6 pt-6"><div class="flex items-center justify-between"><span class="text-gray-500 font-medium">Tổng cộng:</span><span class="text-2xl font-black text-[#A60817]">${Cart.formatPrice(Cart.getTotalPrice())}</span></div><p class="text-xs text-gray-400 mt-2">Thanh toán khi nhận hàng (COD)</p></div>
            </div>
          </div>
        </div>`;
      lucide.createIcons();

      document.getElementById('order-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const errEl = document.getElementById('order-error');
        errEl.classList.add('hidden');
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Đang đặt hàng...';

        try {
          const data = await api.post('/api/orders', {
            customerName: form.customerName.value,
            customerPhone: form.customerPhone.value,
            customerAddress: form.customerAddress.value,
            note: form.note.value,
            items: Cart.getItems().map(i => ({id:i.id,price:i.price,quantity:i.quantity})),
          });
          Cart.clear();
          el.innerHTML = `<div class="bg-white rounded-3xl shadow-xl p-8 text-center max-w-lg mx-auto"><div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle" class="w-10 h-10 text-green-500"></i></div><h1 class="text-3xl font-extrabold text-gray-900 mb-3" style="font-family:var(--font-heading)">Đặt hàng thành công!</h1><p class="text-gray-500 mb-2 text-lg">Mã đơn: <span class="font-bold text-[#A60817]">#${data.orderId}</span></p><p class="text-gray-500 mb-8">Nhân viên sẽ gọi xác nhận sớm.</p><div class="flex flex-col sm:flex-row gap-3"><a href="menu.html" class="flex-1 flex items-center justify-center gap-2 py-3.5 px-6 text-white rounded-2xl font-bold" style="background:linear-gradient(135deg,#A60817,#FE5200)">Tiếp tục mua sắm</a><a href="index.html" class="flex-1 flex items-center justify-center gap-2 py-3.5 px-6 bg-gray-100 text-gray-700 rounded-2xl font-bold hover:bg-gray-200">Về trang chủ</a></div></div>`;
          lucide.createIcons();
        } catch(err) {
          errEl.textContent = err.error || 'Đã xảy ra lỗi.';
          errEl.classList.remove('hidden');
          btn.disabled = false; btn.innerHTML = '<i data-lucide="shopping-cart" class="w-5 h-5"></i> Xác nhận đặt hàng';
          lucide.createIcons();
        }
      });
    }

    document.addEventListener('DOMContentLoaded', renderCheckout);
  </script>
</body>
</html>
